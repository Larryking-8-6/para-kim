<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💕 Para Kim</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      background:#0d1318;
      min-height:100vh;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      overflow:hidden;font-family:Georgia,serif;
    }
    #splash{
      position:fixed;inset:0;z-index:200;background:#0d1318;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      cursor:pointer;transition:opacity 1.2s ease;
    }
    #splash.hide{opacity:0;pointer-events:none;}
    .splash-heart{
      font-size:86px;
      filter:drop-shadow(0 0 32px rgba(255,80,130,1));
      animation:hb 1.6s ease-in-out infinite;
      margin-bottom:20px;
    }
    .splash-msg{
      color:rgba(255,200,220,0.9);font-size:clamp(14px,3.5vw,20px);
      letter-spacing:5px;text-transform:uppercase;
    }
    .splash-hint{
      color:rgba(255,160,190,0.5);font-size:12px;
      letter-spacing:2px;margin-top:12px;font-style:italic;
    }
    .header{
      display:flex;flex-direction:column;align-items:center;
      opacity:0;animation:fadeD 1.4s ease 0.5s forwards;
      position:relative;z-index:10;
    }
    @keyframes fadeD{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
    .heart-main{
      font-size:clamp(40px,11vw,68px);line-height:1;
      filter:drop-shadow(0 0 20px rgba(255,60,110,1)) drop-shadow(0 0 50px rgba(255,20,70,.6));
      animation:hb 2s ease-in-out infinite;
    }
    @keyframes hb{
      0%,100%{transform:scale(1);}14%{transform:scale(1.2);}
      28%{transform:scale(1);}42%{transform:scale(1.12);}56%{transform:scale(1);}
    }
    .name{
      font-size:clamp(22px,6vw,34px);color:rgba(255,200,225,0.95);
      letter-spacing:10px;text-transform:uppercase;
      text-shadow:0 0 24px rgba(255,80,130,.7),0 0 60px rgba(255,40,100,.3);margin-top:2px;
    }
    .tagline{
      font-size:clamp(9px,2vw,12px);color:rgba(255,160,190,0.55);
      letter-spacing:3px;margin-top:4px;font-style:italic;
    }
    .wrap{width:min(96vw,520px);position:relative;margin-top:-6px;}
    svg{width:100%;height:auto;overflow:visible;display:block;}
    .msg{
      position:absolute;left:50%;top:50%;
      transform:translate(-50%,-50%);
      text-align:center;pointer-events:none;width:62%;opacity:0;
      color:rgba(255,225,240,0.9);font-size:clamp(11px,2.4vw,14px);
      line-height:1.8;text-shadow:0 0 16px rgba(255,100,150,.7);font-style:italic;
    }
    .msg.show{animation:msgAnim 6s ease-in-out forwards;}
    @keyframes msgAnim{
      0%{opacity:0;transform:translate(-50%,-44%);}
      14%{opacity:1;transform:translate(-50%,-50%);}
      80%{opacity:1;transform:translate(-50%,-50%);}
      100%{opacity:0;transform:translate(-50%,-56%);}
    }
    .sparkle{position:absolute;border-radius:50%;pointer-events:none;animation:spk 1.2s ease-out forwards;}
    @keyframes spk{0%{transform:scale(0);opacity:1;}50%{transform:scale(1.6);opacity:.7;}100%{transform:scale(0);opacity:0;}}
    .petal-fall{position:fixed;pointer-events:none;font-size:clamp(10px,2vw,16px);opacity:0;animation:petalDrop linear forwards;z-index:5;}
    @keyframes petalDrop{0%{opacity:0;transform:translateY(-20px) rotate(0deg);}10%{opacity:.8;}90%{opacity:.4;}100%{opacity:0;transform:translateY(110vh) rotate(380deg);}}
    .note{position:absolute;pointer-events:none;opacity:0;animation:noteUp linear forwards;}
    @keyframes noteUp{0%{opacity:0;transform:translateY(0) rotate(-8deg);}12%{opacity:1;}88%{opacity:.4;}100%{opacity:0;transform:translateY(-90px) rotate(20deg);}}
    .star{position:fixed;border-radius:50%;pointer-events:none;background:white;animation:twinkle ease-in-out infinite alternate;}
    @keyframes twinkle{from{opacity:.1;}to{opacity:.7;}}
  </style>
</head>
<body>

<div id="stars"></div>

<div id="splash" onclick="startExp()">
  <div class="splash-heart">❤️</div>
  <div class="splash-msg">Para Kim</div>
  <div class="splash-hint">toca para abrir ♡</div>
</div>

<!-- Contenedor del reproductor de YouTube (invisible) -->
<div id="yt-container" style="position:fixed;width:1px;height:1px;top:-9999px;left:-9999px;overflow:hidden;pointer-events:none;">
  <div id="yt-player"></div>
</div>

<div class="header">
  <span class="heart-main">❤️</span>
  <span class="name">Kim</span>
  <span class="tagline">para ti, siempre ♡</span>
</div>

<div class="wrap" id="wrap">
<svg id="svg" viewBox="0 0 520 520" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="tG" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"  stop-color="#6dddd6"/>
    <stop offset="100%" stop-color="#2a9890"/>
  </linearGradient>
  <radialGradient id="pD" cx="35%" cy="25%" r="70%">
    <stop offset="0%"   stop-color="#ffd0b0"/>
    <stop offset="55%"  stop-color="#e89060"/>
    <stop offset="100%" stop-color="#b85030"/>
  </radialGradient>
  <radialGradient id="pL" cx="35%" cy="25%" r="70%">
    <stop offset="0%"   stop-color="#ffe8d6"/>
    <stop offset="50%"  stop-color="#f4b08a"/>
    <stop offset="100%" stop-color="#d07050"/>
  </radialGradient>
  <linearGradient id="lG" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#7de8e0"/>
    <stop offset="100%" stop-color="#1a7870"/>
  </linearGradient>
  <linearGradient id="bG" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#fff5f0"/>
    <stop offset="100%" stop-color="#e8c0a0"/>
  </linearGradient>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glowL" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="5.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glowP">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<g id="stems-L"></g>
<g id="stems-R" transform="translate(520,0) scale(-1,1)"></g>
<g id="deco-L"></g>
<g id="deco-R" transform="translate(520,0) scale(-1,1)"></g>
<g id="ch" opacity="0" filter="url(#glowP)">
  <text x="260" y="298" text-anchor="middle" font-size="56"
        fill="rgba(255,90,140,0.12)" style="font-family:serif;">❤</text>
</g>
<circle cx="260" cy="275" r="138" fill="none" stroke="rgba(255,100,150,0.08)" stroke-width="1"/>
<circle cx="260" cy="275" r="170" fill="none" stroke="#4ab8b0" stroke-width="0.3" opacity="0.06"/>
<circle cx="260" cy="275" r="105" fill="none" stroke="rgba(255,100,150,0.05)" stroke-width="0.8"/>
</svg>
<div class="msg" id="msg0"></div>
</div>

<!-- YouTube IFrame API — se carga de forma asíncrona -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
const NS="http://www.w3.org/2000/svg";
const mk=(tag,a)=>{const e=document.createElementNS(NS,tag);Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));return e;};
const $=id=>document.getElementById(id);

const eIO4=t=>t<.5?8*t*t*t*t:1-Math.pow(-2*t+2,4)/2;
const eOC =t=>1-Math.pow(1-t,3);
const eOE =t=>{if(!t||t===1)return t;const c=(2*Math.PI)/3;return Math.pow(2,-10*t)*Math.sin((t*10-.75)*c)+1;};
const eOB =t=>{const c=1.70158,c3=c+1;return 1+c3*Math.pow(t-1,3)+c*Math.pow(t-1,2);};

function anim(dur,del,fn,cb,done){
  setTimeout(()=>{const s=performance.now();(function t(n){const p=Math.min((n-s)/dur,1);cb(fn(p),p);if(p<1)requestAnimationFrame(t);else if(done)done();})(performance.now());},del);
}
function drawStem(p,dur,del){
  requestAnimationFrame(()=>{
    const L=p.getTotalLength();
    p.setAttribute("stroke-dasharray",L);p.setAttribute("stroke-dashoffset",L);
    anim(dur,del,eIO4,(e)=>p.setAttribute("stroke-dashoffset",L*(1-e)));
  });
}
function floatUp(el,dur,del,dist=18){
  el.style.opacity=0;
  anim(dur,del,eOC,(e)=>{el.style.opacity=Math.min(e*1.4,1);el.style.transform=`translateY(${dist*(1-e)}px)`;});
}
function popUp(el,dur,del){
  el.style.opacity=0;el.style.transform="scale(0) translateY(12px)";
  anim(dur,del,eOE,(e)=>{const s=Math.max(e,0);el.style.opacity=Math.min(e*2,1);el.style.transform=`scale(${s}) translateY(${12*(1-Math.min(e*1.5,1))}px)`;});
}
function petalOpen(el,dur,del,ang=15){
  el.style.opacity=0;el.style.transform=`scale(0) rotate(${ang}deg) translateY(8px)`;
  anim(dur,del,eOB,(e)=>{const s=Math.max(e,0),a=ang*(1-Math.min(e*1.8,1)),y=8*(1-Math.min(e*1.6,1));el.style.opacity=Math.min(e*2,1);el.style.transform=`scale(${s}) rotate(${a}deg) translateY(${y}px)`;});
}

for(let i=0;i<55;i++){
  const s=document.createElement("div");s.className="star";
  const sz=Math.random()*2+.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s;opacity:.3;`;
  $("stars").appendChild(s);
}

const ST={stroke:"url(#tG)",fill:"none","stroke-linecap":"round","stroke-linejoin":"round"};
[
  ["M260,490 C245,455 218,418 192,378 C166,338 138,292 122,252 C106,212 106,170 120,142 C131,120 148,109 166,104",2.8,0,2400],
  ["M166,104 C177,90 191,77 198,60",1.9,1900,1000],
  ["M130,222 C108,208 80,202 55,192",1.9,900,1000],
  ["M124,274 C100,262 72,258 46,250",1.7,1100,1000],
  ["M140,318 C116,313 88,316 65,321",1.4,1300,1000],
  ["M178,392 C156,403 130,408 111,402 C94,397 86,384 88,370",1.4,1500,1100],
  ["M215,432 C198,448 177,458 159,458 C145,458 135,450 132,440",1.3,1650,1000],
  ["M260,490 C253,500 240,505 229,500 C220,496 216,488 218,480",1.1,1750,900],
].forEach(([d,sw,delay,dur])=>{
  ["stems-L","stems-R"].forEach(g=>{const p=mk("path",{...ST,"stroke-width":sw,d});$(g).appendChild(p);drawStem(p,dur,delay);});
});

const T0=2800;
["M130,222 C108,200 78,192 54,194 C76,198 108,210 130,222 Z",
 "M124,274 C100,256 70,250 46,252 C68,254 100,264 124,274 Z",
 "M140,318 C114,314 86,318 65,322 C88,318 116,316 140,318 Z",
 "M148,144 C126,128 108,114 112,96  C116,112 130,128 148,144 Z",
 "M154,152 C168,134 173,116 166,100 C164,116 160,134 154,152 Z",
 "M191,77  C176,58  170,38  179,22  C181,40 184,58 191,77 Z",
 "M198,60  C210,42  214,24  206,10  C204,26 200,44 198,60 Z",
 "M150,406 C131,393 119,378 123,362 C125,378 136,393 150,406 Z",
 "M172,454 C155,441 147,424 151,408 C153,424 162,440 172,454 Z",
 "M223,498 C212,486 210,472 216,460 C218,474 220,486 223,498 Z",
].forEach((d,i)=>{
  ["deco-L","deco-R"].forEach(g=>{const p=mk("path",{d,fill:"url(#lG)",filter:"url(#glow)"});p.style.transformOrigin="center";$(g).appendChild(p);floatUp(p,850,T0+i*110,22);});
});
const aL=T0+10*110+850;

[[65,308,4,7,-15],[55,186,3.5,6,10],[88,367,3,5.5,-20]].forEach(([cx,cy,rx,ry,rot],i)=>{
  ["deco-L","deco-R"].forEach(g=>{
    const grp=mk("g",{filter:"url(#glow)"});const bx=cx,by=cy+ry;
    const sep=mk("path",{d:`M${bx},${by} C${bx-rx*.8},${by-ry*.4} ${bx-rx*.5},${by-ry*1.2} ${bx},${by-ry*1.6} C${bx+rx*.5},${by-ry*1.2} ${bx+rx*.8},${by-ry*.4} ${bx},${by} Z`,fill:"#4ab8b0",opacity:"0.85"});
    const ov=mk("ellipse",{cx:bx,cy,rx,ry,fill:"url(#bG)"});
    if(rot){sep.setAttribute("transform",`rotate(${rot},${bx},${by})`);ov.setAttribute("transform",`rotate(${rot},${bx},${by})`);}
    grp.appendChild(sep);grp.appendChild(ov);grp.style.transformOrigin=`${cx}px ${cy+ry}px`;
    $(g).appendChild(grp);floatUp(grp,750,aL+i*150,20);
  });
});
const aB=aL+3*150+750;

function buildFlower(g,tx,ty,sc,sd){
  const w=mk("g",{transform:`translate(${tx},${ty}) scale(${sc})`,filter:"url(#glowL)"});
  g.appendChild(w);let d=sd;const S=140;
  [`M0,14 C-6,5 -8,-8 -5,-20 C-2,-8 0,5 0,14 Z`,`M0,14 C6,5 8,-8 5,-20 C2,-8 0,5 0,14 Z`].forEach(pd=>{
    const p=mk("path",{d:pd,fill:"#4ab8b0",opacity:"0.85"});p.style.transformOrigin="0 14px";w.appendChild(p);floatUp(p,600,d,15);d+=S*.5;
  });
  [
    [`M0,4 C-12,-2 -22,-16 -18,-32 C-10,-20 -4,-8 0,4 Z`,"url(#pD)","0 4px",-15,""],
    [`M0,4 C12,-2 22,-16 18,-32 C10,-20 4,-8 0,4 Z`,"url(#pD)","0 4px",15,""],
    [`M0,4 C-16,-1 -27,-14 -22,-32 C-13,-18 -5,-6 0,4 Z`,"url(#pL)","0 4px",-10,"rotate(-32,0,4)"],
    [`M0,4 C16,-1 27,-14 22,-32 C13,-18 5,-6 0,4 Z`,"url(#pL)","0 4px",10,"rotate(32,0,4)"],
    [`M0,4 C-7,-10 -6,-26 0,-38 C6,-26 7,-10 0,4 Z`,"url(#pL)","0 4px",0,""],
  ].forEach(([pd,fill,to,ang,tr])=>{
    const p=mk("path",{d:pd,fill,...(tr?{transform:tr}:{})});p.style.transformOrigin=to;w.appendChild(p);petalOpen(p,800,d,ang);d+=S;
  });
  [
    [`M0,2 C-9,-5 -13,-18 -9,-26 C-5,-18 -2,-7 0,2 Z`,"#ffeedd",0.88,"0 2px","rotate(-18,0,2)",-12],
    [`M0,2 C9,-5 13,-18 9,-26 C5,-18 2,-7 0,2 Z`,"#ffeedd",0.88,"0 2px","rotate(18,0,2)",12],
    [`M0,2 C-5,-9 -4,-22 0,-30 C4,-22 5,-9 0,2 Z`,"#fff5ee",0.93,"0 2px","",0],
  ].forEach(([pd,fill,op,to,tr,ang])=>{
    const p=mk("path",{d:pd,fill,opacity:op,...(tr?{transform:tr}:{})});p.style.transformOrigin=to;w.appendChild(p);petalOpen(p,680,d,ang);d+=S*.8;
  });
  [[0,-12,8,"#f5e060"],[0,-12,5,"#e0c040"],[-2,-14,1.4,"#a07010"],[2,-10,1.4,"#a07010"],
   [0,-9,1.3,"#a07010"],[-1,-16,1.1,"#c09020"],[1,-16,1.1,"#c09020"]
  ].forEach(([cx,cy,r,fill],i)=>{
    const c=mk("circle",{cx,cy,r,fill});c.style.transformOrigin=`${cx}px ${cy}px`;w.appendChild(c);popUp(c,550,d+i*45);
  });
  d+=350;
  [[-3,-6,-4,-20],[3,-6,4,-20],[0,-6,0,-22]].forEach(([x1,y1,x2,y2],i)=>{
    const ln=mk("line",{x1,y1,x2,y2,stroke:"#c8a030","stroke-width":"0.9"});ln.style.opacity=0;w.appendChild(ln);
    anim(600,d+i*70,eOC,(e)=>ln.style.opacity=e*0.9);
  });
}
[[120,184,1.08,0],[182,94,0.82,900],[50,245,0.65,1700]].forEach(([tx,ty,sc,ex])=>{
  ["deco-L","deco-R"].forEach((g,side)=>{
    const grp=mk("g",{});const delay=aB+ex+side*110;
    buildFlower(grp,tx,ty,sc,delay);grp.style.opacity=0;
    anim(1100,delay,eOC,(e)=>{grp.style.opacity=Math.min(e*1.3,1);grp.style.transform=`translateY(${22*(1-e)}px)`;});
    $(g).appendChild(grp);
  });
});
const aF=aB+1700+2400;

anim(1400,aF,eOC,(e)=>{$("ch").style.opacity=e*.55;});

[[93,180,2.6,"#5ecec6"],[70,204,2.1,"#5ecec6"],[48,228,1.9,"#5ecec6"],
 [83,302,2.1,"#5ecec6"],[158,112,1.9,"#5ecec6"],[142,345,1.6,"#5ecec6"],
 [113,394,1.6,"#5ecec6"],[103,162,1.6,"white"],[78,246,1.3,"white"],
 [177,80,1.9,"white"],[193,60,1.4,"white"],
].forEach(([cx,cy,r,fill],i)=>{
  ["deco-L","deco-R"].forEach(g=>{
    const c=mk("circle",{cx,cy,r,fill,filter:"url(#glow)"});c.style.opacity=0;$(g).appendChild(c);
    anim(700,aF+i*95,eOC,(e)=>{c.style.opacity=fill==="white"?e*.65:e*.85;c.style.transform=`translateY(${10*(1-e)}px)`;});
  });
});
const afterAll=aF+11*95+800;

const mensajes=[
  "Eres tú,\nquien hace que todo tenga sentido. 🌸",
  "Como las flores que florecen,\ntu sonrisa ilumina mi mundo. ✨",
  "Kim,\neres mi lugar favorito en el universo. 💫",
  "Cada día contigo\nes mi canción favorita. 🎵",
  "Gracias por existir\ny por ser exactamente tú. 🌷",
  "Eres la razón\nde todas mis flores favoritas. ❤️",
  "Kim,\nsiempre en mi corazón. 🌙",
];
let msgIdx=0;
function showMsg(){
  const el=$("msg0");
  el.innerHTML=mensajes[msgIdx%mensajes.length].replace(/\n/g,"<br>");
  el.classList.remove("show");void el.offsetWidth;el.classList.add("show");msgIdx++;
}
setTimeout(()=>{showMsg();setInterval(showMsg,6200);},afterAll);

const noteSyms=["♪","♫","♬","♩"];
function spawnNote(){
  const n=document.createElement("div");n.className="note";
  n.textContent=noteSyms[Math.floor(Math.random()*noteSyms.length)];
  const hue=310+Math.random()*50;
  n.style.cssText=`left:${16+Math.random()*68}%;bottom:${3+Math.random()*20}%;font-size:${13+Math.random()*11}px;color:hsla(${hue},80%,78%,0.85);animation-duration:${3+Math.random()*2.5}s;`;
  $("wrap").appendChild(n);setTimeout(()=>n.remove(),6000);
}
setTimeout(()=>setInterval(spawnNote,1000),afterAll+200);

const petalEmojis=["🌸","🌺","✿","❀","🌼"];
function spawnPetal(){
  const p=document.createElement("div");p.className="petal-fall";
  p.textContent=petalEmojis[Math.floor(Math.random()*petalEmojis.length)];
  p.style.cssText=`left:${Math.random()*100}%;top:0;opacity:0.7;animation-duration:${5+Math.random()*5}s;animation-delay:${Math.random()*.5}s;`;
  document.body.appendChild(p);setTimeout(()=>p.remove(),12000);
}
setTimeout(()=>setInterval(spawnPetal,1800),afterAll+1000);

const sparkleColors=[
  "radial-gradient(circle,#fff 0%,#ffaac8 55%,transparent 100%)",
  "radial-gradient(circle,#fff 0%,#7ee8e0 55%,transparent 100%)",
  "radial-gradient(circle,#fff 0%,#ffe080 55%,transparent 100%)",
];
function spawnSparkle(){
  const s=document.createElement("div");s.className="sparkle";const sz=3+Math.random()*6;
  s.style.cssText=`left:${18+Math.random()*64}%;top:${5+Math.random()*80}%;width:${sz}px;height:${sz}px;background:${sparkleColors[Math.floor(Math.random()*sparkleColors.length)]};animation-duration:${0.9+Math.random()*0.8}s;`;
  $("wrap").appendChild(s);setTimeout(()=>s.remove(),2000);
}
setTimeout(()=>setInterval(spawnSparkle,600),afterAll+300);

// ══ AUDIO — YouTube IFrame Player API ══
let ytPlayer = null;
let playerReady = false;
let playRequested = false;

// Callback global requerido por la API de YouTube
function onYouTubeIframeAPIReady() {
  ytPlayer = new YT.Player('yt-player', {
    videoId: '9FhRQt1vm3A',
    playerVars: {
      autoplay: 0,
      loop: 1,
      playlist: '9FhRQt1vm3A',
      controls: 0,
      disablekb: 1,
      fs: 0,
      modestbranding: 1,
      rel: 0,
    },
    events: {
      onReady: function(e) {
        playerReady = true;
        // Si el usuario ya tocó la pantalla antes de que el player estuviera listo
        if (playRequested) {
          e.target.setVolume(80);
          e.target.playVideo();
        }
      }
    }
  });
}

function startExp() {
  const sp = $("splash");
  sp.classList.add("hide");
  setTimeout(() => sp.style.display = "none", 1300);

  if (playerReady && ytPlayer) {
    ytPlayer.setVolume(80);
    ytPlayer.playVideo();
  } else {
    // El player aún no cargó — marcar para reproducir cuando esté listo
    playRequested = true;
  }
}
</script>
</body>
</html>
